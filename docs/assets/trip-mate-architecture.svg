<svg width="1280" height="840" viewBox="0 0 1280 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Trip Mate Architecture Diagram</title>
  <desc id="desc">Professional layered Flutter architecture diagram showing UI screens, Provider view models, data repositories, services, and external integrations used by Trip Mate.</desc>

  <defs>
    <filter id="softShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L11 6L1 11V1Z" fill="#4b5563"/>
    </marker>
    <style>
      .bg { fill: #f7f8fa; }
      .title { fill: #111827; font: 700 32px Arial, Helvetica, sans-serif; }
      .subtitle { fill: #4b5563; font: 400 16px Arial, Helvetica, sans-serif; }
      .card { fill: #ffffff; stroke: #d1d5db; stroke-width: 1.5; filter: url(#softShadow); }
      .header { fill: #1f2937; }
      .headerText { fill: #ffffff; font: 700 16px Arial, Helvetica, sans-serif; }
      .section { fill: #111827; font: 700 13px Arial, Helvetica, sans-serif; }
      .body { fill: #374151; font: 400 12.5px Arial, Helvetica, sans-serif; }
      .small { fill: #6b7280; font: 400 11.5px Arial, Helvetica, sans-serif; }
      .chip { fill: #f9fafb; stroke: #d1d5db; stroke-width: 1.2; }
      .chipTitle { fill: #111827; font: 700 12px Arial, Helvetica, sans-serif; }
      .chipBody { fill: #4b5563; font: 400 10.8px Arial, Helvetica, sans-serif; }
      .arrow { stroke: #4b5563; stroke-width: 2; marker-end: url(#arrow); fill: none; }
      .softArrow { stroke: #9ca3af; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#arrow); fill: none; }
      .label { fill: #4b5563; font: 700 10.5px Arial, Helvetica, sans-serif; letter-spacing: 0.2px; }
      .noteTitle { fill: #111827; font: 700 13px Arial, Helvetica, sans-serif; }
      .noteText { fill: #374151; font: 400 12px Arial, Helvetica, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="840"/>

  <text class="title" x="64" y="68">Trip Mate Travel Planner Architecture</text>
  <text class="subtitle" x="64" y="96">Layered Flutter app using Provider, repositories, services, Firebase, and travel APIs.</text>

  <!-- UI layer -->
  <rect class="card" x="56" y="144" width="248" height="454" rx="14"/>
  <path class="header" d="M56 158C56 150.268 62.268 144 70 144H290C297.732 144 304 150.268 304 158V196H56V158Z"/>
  <text class="headerText" x="80" y="177">Flutter UI Layer</text>

  <text class="section" x="80" y="225">App shell</text>
  <text class="body" x="80" y="250">main.dart</text>
  <text class="body" x="80" y="271">app.dart</text>
  <text class="small" x="80" y="294">Provider setup, theme, navigation</text>

  <text class="section" x="80" y="338">Screens</text>
  <text class="body" x="80" y="363">Auth, home, discover</text>
  <text class="body" x="80" y="384">Trip planning, planner</text>
  <text class="body" x="80" y="405">Saved places, countries</text>
  <text class="body" x="80" y="426">Profile and settings</text>

  <text class="section" x="80" y="474">Reusable widgets</text>
  <text class="body" x="80" y="499">ui/components</text>
  <text class="body" x="80" y="520">ui/helpers</text>

  <rect class="chip" x="80" y="548" width="200" height="28" rx="8"/>
  <text class="chipBody" x="96" y="567">User interactions and UI state</text>

  <!-- View model layer -->
  <rect class="card" x="356" y="144" width="264" height="454" rx="14"/>
  <path class="header" d="M356 158C356 150.268 362.268 144 370 144H606C613.732 144 620 150.268 620 158V196H356V158Z"/>
  <text class="headerText" x="380" y="177">Provider ViewModels</text>

  <text class="section" x="380" y="225">State and business flow</text>
  <text class="body" x="380" y="250">AuthViewModel</text>
  <text class="body" x="380" y="271">TripsViewModel</text>
  <text class="body" x="380" y="292">DiscoverViewModel</text>
  <text class="body" x="380" y="313">PlannerViewModel</text>
  <text class="body" x="380" y="334">SavedViewModel</text>
  <text class="body" x="380" y="355">CountriesViewModel</text>
  <text class="body" x="380" y="376">RecommendedCountriesVM</text>
  <text class="body" x="380" y="397">ThemeViewModel</text>

  <rect class="chip" x="380" y="435" width="216" height="96" rx="10"/>
  <text class="chipTitle" x="398" y="462">Responsibilities</text>
  <text class="body" x="398" y="486">Expose loading, data, and errors</text>
  <text class="body" x="398" y="507">Run validation and user actions</text>

  <rect class="chip" x="380" y="548" width="216" height="28" rx="8"/>
  <text class="chipBody" x="398" y="567">Concrete repositories are created here</text>

  <!-- Domain and data layer -->
  <rect class="card" x="672" y="144" width="306" height="454" rx="14"/>
  <path class="header" d="M672 158C672 150.268 678.268 144 686 144H964C971.732 144 978 150.268 978 158V196H672V158Z"/>
  <text class="headerText" x="696" y="177">Domain and Data Layer</text>

  <text class="section" x="696" y="225">Models</text>
  <text class="body" x="696" y="250">Trip, Place, PlannerItem</text>
  <text class="body" x="696" y="271">Country, UserProfile</text>

  <text class="section" x="696" y="315">Repository contracts</text>
  <text class="body" x="696" y="340">TripsRepository</text>
  <text class="body" x="696" y="361">PlacesRepository</text>
  <text class="body" x="696" y="382">PlannerRepository</text>
  <text class="body" x="696" y="403">SavedRepository</text>
  <text class="body" x="696" y="424">CountriesRepository</text>
  <text class="body" x="696" y="445">UserProfileRepository</text>

  <text class="section" x="696" y="489">Services and helpers</text>
  <text class="body" x="696" y="514">LocationService</text>
  <text class="body" x="696" y="535">ReverseGeocodingService</text>
  <text class="body" x="696" y="556">Trip validation helpers</text>
  <text class="body" x="696" y="577">Planner overlap checks</text>

  <!-- External services -->
  <rect class="card" x="1034" y="112" width="190" height="574" rx="14"/>
  <path class="header" d="M1034 126C1034 118.268 1040.268 112 1048 112H1210C1217.732 112 1224 118.268 1224 126V164H1034V126Z"/>
  <text class="headerText" x="1058" y="145">External Services</text>

  <rect class="chip" x="1058" y="188" width="142" height="58" rx="9"/>
  <text class="chipTitle" x="1078" y="215">Firebase Auth</text>
  <text class="chipBody" x="1078" y="233">Email/password users</text>

  <rect class="chip" x="1058" y="266" width="142" height="82" rx="9"/>
  <text class="chipTitle" x="1078" y="293">Cloud Firestore</text>
  <text class="chipBody" x="1078" y="311">trips, plannerItems</text>
  <text class="chipBody" x="1078" y="329">savedPlaces, profiles</text>

  <rect class="chip" x="1058" y="368" width="142" height="76" rx="9"/>
  <text class="chipTitle" x="1078" y="395">Geoapify APIs</text>
  <text class="chipBody" x="1078" y="413">Places discovery</text>
  <text class="chipBody" x="1078" y="431">Reverse geocoding</text>

  <rect class="chip" x="1058" y="464" width="142" height="58" rx="9"/>
  <text class="chipTitle" x="1078" y="491">REST Countries</text>
  <text class="chipBody" x="1078" y="509">Country details</text>

  <rect class="chip" x="1058" y="542" width="142" height="58" rx="9"/>
  <text class="chipTitle" x="1078" y="569">Device GPS</text>
  <text class="chipBody" x="1078" y="587">Geolocator</text>

  <rect class="chip" x="1058" y="620" width="142" height="42" rx="9"/>
  <text class="chipTitle" x="1078" y="646">SharedPreferences</text>

  <!-- Main flow arrows -->
  <path class="arrow" d="M304 370H356"/>

  <path class="arrow" d="M620 370H672"/>

  <!-- External integration arrows routed through the gutter -->
  <path class="softArrow" d="M620 230C654 230 642 120 742 120H1010V217H1058"/>
  <text class="label" x="806" y="110">AuthViewModel - Firebase Auth</text>

  <path class="arrow" d="M978 307H1058"/>
  <text class="label" x="1002" y="293">DATA</text>

  <path class="arrow" d="M978 406H1058"/>
  <text class="label" x="996" y="392">PLACES</text>

  <path class="arrow" d="M978 493H1058"/>
  <text class="label" x="991" y="479">COUNTRIES</text>

  <path class="arrow" d="M978 571H1058"/>
  <text class="label" x="1000" y="557">LOCATION</text>

  <path class="softArrow" d="M596 562C708 680 886 700 1058 641"/>
  <text class="label" x="742" y="708">ThemeViewModel - SharedPreferences</text>

  <!-- Summary note -->
  <rect x="64" y="724" width="1160" height="76" rx="12" fill="#eef0f3" stroke="#d1d5db" stroke-width="1.2"/>
  <text class="noteTitle" x="88" y="751">Primary data flow</text>
  <text class="noteText" x="88" y="774">Screens call Provider view models. View models coordinate repositories, services, validation helpers, and local state.</text>
  <text class="noteText" x="88" y="794">Repository and service implementations communicate with Firebase, Geoapify, REST Countries, device GPS, and local preferences.</text>
</svg>
